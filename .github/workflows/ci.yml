name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Read-only by default; jobs that need more must opt in explicitly.
permissions:
  contents: read

# Cancel in-flight runs on the same branch (except main, where we let every
# commit finish so audit logs are complete).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  node-quality:
    name: Node — lint, typecheck, tests
    runs-on: ubuntu-latest

    # Service container: Postgres on localhost:5432 for the integration tests
    # that need a real database (postgres-user-repository.test.ts).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # When this is set, postgres-user-repository.test.ts runs against the
      # service container instead of being skipped.
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          # Two lock files: node-api + web. Caches keyed by their hashes.
          cache: npm
          cache-dependency-path: |
            services/node-api/package-lock.json
            web/package-lock.json

      - name: Install node-api deps
        working-directory: services/node-api
        run: npm ci

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Quality gates (lint + typecheck + tests)
        run: make node-check

      - name: Build web (Vite production bundle)
        working-directory: web
        run: npm run build

  spring-quality:
    name: Spring — verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Testcontainers needs Docker. ubuntu-latest already has it.
      - name: Maven verify (compile + tests with Testcontainers)
        working-directory: services/spring-api
        run: mvn -B verify

  images:
    name: Build images (no push)
    runs-on: ubuntu-latest
    needs: [node-quality, spring-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # All image builds share the GHA cache scoped per service.
      - name: Build node-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/node-api/Dockerfile
          push: false
          tags: node-ts-starter-node-api:ci
          cache-from: type=gha,scope=node-api
          cache-to: type=gha,scope=node-api,mode=max

      - name: Build spring-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/spring-api/Dockerfile
          push: false
          tags: node-ts-starter-spring-api:ci
          cache-from: type=gha,scope=spring-api
          cache-to: type=gha,scope=spring-api,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: false
          tags: node-ts-starter-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
