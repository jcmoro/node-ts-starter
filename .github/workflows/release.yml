name: Release

# Trigger on version tags (v1.2.3) or manual dispatch.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

# packages: write is the minimum needed to push to GHCR.
permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # never cancel a release in flight

jobs:
  publish:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ----- node-api -----

      - name: Metadata (node-api)
        id: meta-node-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/node-api
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push node-api
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/node-api/Dockerfile
          push: true
          tags: ${{ steps.meta-node-api.outputs.tags }}
          labels: ${{ steps.meta-node-api.outputs.labels }}
          cache-from: type=gha,scope=node-api
          cache-to: type=gha,scope=node-api,mode=max

      # ----- spring-api -----

      - name: Metadata (spring-api)
        id: meta-spring-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/spring-api
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push spring-api
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/spring-api/Dockerfile
          push: true
          tags: ${{ steps.meta-spring-api.outputs.tags }}
          labels: ${{ steps.meta-spring-api.outputs.labels }}
          cache-from: type=gha,scope=spring-api
          cache-to: type=gha,scope=spring-api,mode=max

      # ----- web -----

      - name: Metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
