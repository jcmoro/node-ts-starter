# nginx config for the Vite SPA.
# Mounted at /etc/nginx/conf.d/default.conf inside the runtime image.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long cache for fingerprinted assets (Vite outputs hashed filenames).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Short cache for the entry HTML so deploys propagate quickly.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA fallback: any unknown route returns index.html so the client router
    # can take over. With hash routing this is rarely hit, but it's correct
    # for the History API too.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Hide nginx version in headers.
    server_tokens off;
}
