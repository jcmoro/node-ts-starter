# Prometheus config — minimal for local dev.
# Scrapes the api's /metrics endpoint every 5s and retains 2h of data.

global:
  scrape_interval: 5s
  scrape_timeout: 3s
  evaluation_interval: 15s
  external_labels:
    env: dev
    cluster: local

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:3000']
        labels:
          service: node-ts-starter-api

  # Prometheus scrapes itself — useful to see Prometheus's own RED metrics.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
